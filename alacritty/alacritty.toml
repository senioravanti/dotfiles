[font]
size = 12.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[general]
import = [
  "~/.config/alacritty/themes/themes/catppuccin_macchiato.toml"
]

[terminal]
shell = { program = "/usr/bin/zsh", args = [ "-l", "-c", "zellij" ] }

